name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Unzip mod
        run: unzip highlighter-mod.zip
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: cd highlighter-mod && chmod +x gradlew && ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: highlighter-mod
          path: highlighter-mod/build/libs/*.jar
