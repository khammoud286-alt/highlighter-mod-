name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip mod
        run: unzip highlighter-mod.zip
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Build
        run: cd highlighter-mod && gradle build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: highlighter-mod
          path: highlighter-mod/build/libs/*.jar
